<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Estoque</title>

  <link rel="stylesheet" href="style.css">

  <!-- Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="container">
  <div class="layout">

    <!-- ESQUERDA -->
    <div class="painel-esquerdo">

      <h2>📷 Scanner</h2>

      <div id="scanner"></div>

      <table class="form-tabela">
        <tr>
          <td>Nome:</td>
          <td><input type="text" id="nome"></td>
        </tr>
        <tr>
          <td>Código:</td>
          <td><input type="text" id="codigo"></td>
        </tr>
        <tr>
          <td>Quantidade:</td>
          <td><input type="number" id="quantidade"></td>
        </tr>
      </table>

      <button onclick="registrar('entrada')">Entrada ➕</button>
      <button onclick="registrar('saida')">Saída ➖</button>

    </div>

    <!-- DIREITA -->
    <div class="painel-direito">

      <h2>📋 Estoque de Produtos</h2>

      <!-- BUSCA -->
      <input 
        type="text" 
        id="busca" 
        placeholder="🔍 Buscar produto..."
        onkeyup="filtrarTabela()"
        class="input-busca"
      >

      <table class="tabela-estoque">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Código</th>
            <th>Quantidade</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>

    </div>

  </div>
</div>

<script>
let estoque = JSON.parse(localStorage.getItem("estoque")) || {};

function salvar() {
  localStorage.setItem("estoque", JSON.stringify(estoque));
}

// SCANNER
const html5QrCode = new Html5Qrcode("scanner");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      (codigo) => {

        document.getElementById("codigo").value = codigo;

        if (estoque[codigo]) {
          document.getElementById("nome").value = estoque[codigo].nome;
        }

        if (navigator.vibrate) navigator.vibrate(200);
      }
    );
  }
});

// REGISTRAR
function registrar(tipo) {
  let codigo = document.getElementById("codigo").value;
  let nome = document.getElementById("nome").value;
  let quantidade = parseInt(document.getElementById("quantidade").value);

  if (!codigo || !nome || !quantidade) {
    alert("Preencha tudo!");
    return;
  }

  if (!estoque[codigo]) {
    estoque[codigo] = { nome, quantidade: 0 };
  }

  if (tipo === 'entrada') {
    estoque[codigo].quantidade += quantidade;
  } else {
    estoque[codigo].quantidade -= quantidade;
  }

  salvar();
  atualizarTabela();
}

// TABELA
function atualizarTabela() {
  let tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  for (let codigo in estoque) {
    let item = estoque[codigo];

    tabela.innerHTML += `
      <tr>
        <td contenteditable="true" onblur="editarNome('${codigo}', this.innerText)">
          ${item.nome}
        </td>
        <td>${codigo}</td>
        <td contenteditable="true" onblur="editarQuantidade('${codigo}', this.innerText)">
          ${item.quantidade}
        </td>
        <td><button onclick="remover('${codigo}')">❌</button></td>
      </tr>
    `;
  }
}

// BUSCA
function filtrarTabela() {
  let busca = document.getElementById("busca").value.toLowerCase();
  let linhas = document.querySelectorAll("#tabela tr");

  linhas.forEach(linha => {
    let nome = linha.children[0].innerText.toLowerCase();
    let codigo = linha.children[1].innerText.toLowerCase();

    linha.style.display = 
      nome.includes(busca) || codigo.includes(busca)
      ? "" : "none";
  });
}

// EDITAR
function editarNome(codigo, valor) {
  estoque[codigo].nome = valor;
  salvar();
}

function editarQuantidade(codigo, valor) {
  estoque[codigo].quantidade = parseInt(valor) || 0;
  salvar();
}

// REMOVER
function remover(codigo) {
  delete estoque[codigo];
  salvar();
  atualizarTabela();
}

// INICIAR
atualizarTabela();
</script>

</body>
</html>
