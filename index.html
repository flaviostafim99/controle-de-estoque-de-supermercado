<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Estoque</title>

  <link rel="stylesheet" href="style.css">

  <!-- Scanner -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body>

<div class="container">
  <div class="layout">

    <!-- ESQUERDA -->
    <div class="painel-esquerdo">

      <h2>📷 Scanner</h2>

      <div id="scanner"></div>

      <table class="form-tabela">
        <tr>
          <td>Nome:</td>
          <td><input type="text" id="nome" placeholder="Nome do produto"></td>
        </tr>

        <tr>
          <td>Código:</td>
          <td><input type="text" id="codigo" placeholder="Código de barras"></td>
        </tr>

        <tr>
          <td>Quantidade:</td>
          <td><input type="number" id="quantidade" placeholder="Quantidade"></td>
        </tr>
      </table>

      <button onclick="registrar('entrada')">Entrada ➕</button>
      <button onclick="registrar('saida')">Saída ➖</button>

    </div>

    <!-- DIREITA -->
    <div class="painel-direito">

      <h2>📋 Estoque de Produtos</h2>

      <table class="tabela-estoque">
        <thead>
          <tr>
            <th>Nome do Produto</th>
            <th>Código</th>
            <th>Quantidade</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>

    </div>

  </div>
</div>

<script>
let estoque = JSON.parse(localStorage.getItem("estoque")) || {};

// SALVAR
function salvar() {
  localStorage.setItem("estoque", JSON.stringify(estoque));
}

// SCANNER CONFIGURADO
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector('#scanner'),
    constraints: {
      facingMode: "environment"
    }
  },
  locator: {
    patchSize: "large",
    halfSample: false
  },
  decoder: {
    readers: [
      "ean_reader",
      "ean_8_reader",
      "code_128_reader",
      "upc_reader"
    ]
  },
  locate: true
}, function(err) {
  if (err) {
    console.log(err);
    return;
  }
  console.log("Scanner iniciado");
  Quagga.start();
});

// CONTROLE DE LEITURA
let lendo = false;

// DETECTA CÓDIGO
Quagga.onDetected(function(data) {

  if (lendo) return;

  lendo = true;

  let codigo = data.codeResult.code;
  console.log("Detectado:", codigo);

  // PREENCHE AUTOMATICAMENTE
  document.getElementById("codigo").value = codigo;

  // Se já existe no estoque, preenche nome
  if (estoque[codigo]) {
    document.getElementById("nome").value = estoque[codigo].nome;
  }

  // vibração (celular)
  if (navigator.vibrate) {
    navigator.vibrate(200);
  }

  // evita repetição
  setTimeout(() => {
    lendo = false;
  }, 2000);
});

// REGISTRAR
function registrar(tipo) {
  let codigo = document.getElementById("codigo").value;
  let nome = document.getElementById("nome").value;
  let quantidade = parseInt(document.getElementById("quantidade").value);

  if (!codigo || !nome || !quantidade) {
    alert("Preencha tudo!");
    return;
  }

  if (!estoque[codigo]) {
    estoque[codigo] = { nome: nome, quantidade: 0 };
  }

  if (tipo === 'entrada') {
    estoque[codigo].quantidade += quantidade;
  } else {
    estoque[codigo].quantidade -= quantidade;
  }

  salvar();
  atualizarTabela();
}

// ATUALIZAR TABELA
function atualizarTabela() {
  let tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  for (let codigo in estoque) {
    let item = estoque[codigo];

    let linha = `
      <tr>
        <td contenteditable="true" onblur="editarNome('${codigo}', this.innerText)">
          ${item.nome}
        </td>
        <td>${codigo}</td>
        <td contenteditable="true" onblur="editarQuantidade('${codigo}', this.innerText)">
          ${item.quantidade}
        </td>
        <td>
          <button onclick="remover('${codigo}')">❌</button>
        </td>
      </tr>
    `;
    tabela.innerHTML += linha;
  }
}

// EDITAR
function editarNome(codigo, valor) {
  estoque[codigo].nome = valor;
  salvar();
}

function editarQuantidade(codigo, valor) {
  estoque[codigo].quantidade = parseInt(valor) || 0;
  salvar();
}

// REMOVER
function remover(codigo) {
  delete estoque[codigo];
  salvar();
  atualizarTabela();
}

// INICIAR
atualizarTabela();
</script>

</body>
</html>
